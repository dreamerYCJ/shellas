# ShellAgent 安全规则配置
# 优先级: high → medium → low（先匹配高危）

risk_levels:
  high:
    action: "block"
    patterns:
      # 删除根目录（rm -rf / 或 rm -rf /*）
      - 'rm\s+-[a-zA-Z]*r[a-zA-Z]*f[a-zA-Z]*\s+/\s*$'
      - 'rm\s+-[a-zA-Z]*f[a-zA-Z]*r[a-zA-Z]*\s+/\s*$'
      - 'rm\s+-rf\s+/\*'
      - 'rm\s+-rf\s+/[^.\s]'
      # 格式化磁盘
      - 'mkfs\.'
      # dd 覆写磁盘
      - 'dd\s+if=.*of=/dev/'
      # Fork bomb
      - ':\(\)\{.*\|.*&'
      # 根目录递归改权限
      - 'chmod\s+(-R\s+)?777\s+/\s*$'
      - 'chmod\s+(-R\s+)?777\s+/[^.]'
      # 直接写磁盘设备
      - '>\s*/dev/sd'
      # 远程脚本直接执行
      - 'wget.*\|\s*sh'
      - 'curl.*\|\s*bash'
      - 'curl.*\|\s*sh'

  low:
    action: "auto_execute"
    patterns:
      - '^(ls|cat|head|tail|grep|find|df|du|ps|top|who|date|uname|echo|pwd)\b'
      - '^(wc|sort|uniq|awk|file|stat|which|whereis|hostname)\b'
      - '^(ip\s+a|ss|ping|traceroute|dig|nslookup|free|uptime|env)\b'
      - '^(lscpu|lsblk|lspci|lsusb|id|groups|whoami|w)\b'
      - '^(git\s+(status|log|branch|diff|show))\b'
      - '^(docker\s+(ps|images|logs))\b'
      - '^nvidia-smi\b'
      - '^(python3?|pip|node|npm)\s+--version\b'
      - '^systemctl\s+(is-active|is-enabled|status|show|list-units|list-timers)\b'
      - '^journalctl\s+'
      - '^(dpkg\s+-l|rpm\s+-q|apt\s+list)\b'

  medium:
    action: "confirm"
    patterns:
      - 'rm\s+'
      - 'sudo\s+'
      - 'kill\s+'
      - 'systemctl\s+(stop|restart|disable|enable|start)'
      - 'iptables'
      - 'crontab'
      - 'chmod|chown'
      - 'mv\s+.*\s+/'
      - 'cp\s+'
      - 'mkdir\s+'
      - 'wget\s+|curl\s+-[a-zA-Z]*o'
      - 'apt\s+|yum\s+|dnf\s+|pacman\s+'
      - 'pip\s+install'
      - 'docker\s+(run|stop|rm|rmi|build|exec)'
      - 'tar\s+-[a-zA-Z]*[cxz]'
      - 'unzip\s+'

file_access:
  blocked_paths:
    - "/etc/shadow"
    - "/etc/gshadow"
    - "/.ssh/id_rsa"
    - "/.ssh/id_ed25519"
    - "/.ssh/authorized_keys"
    - "/.env"
    - "/credentials"
    - "/.aws/credentials"
    - "/.kube/config"
